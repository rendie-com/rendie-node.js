name: 1.Shopee用户相关-4小时(vercel版)

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 */4 * * *"

permissions:
  contents: write
  actions: write

env:   
  TZ: Asia/Shanghai
  NODE_USERNAME: "4hour"
  NODE_ACCESS_TOKEN: ${{ secrets.NODE_ACCESS_TOKEN_1 }}
  NODE_REFRESH_TOKEN: ${{ secrets.NODE_REFRESH_TOKEN_1 }}
  NODE_EXPIRES_IN: "1777047860"
  MAX_RUNTIME_MINUTES: 50
  TARGET_DIR: "error/task1"
  GITHUB_TOKEN: ${{ secrets.MY_PAT }}
  GITHUB_OWNER: "rendie-com"
  GITHUB_REPO: "rendie-node.js-error"
  TARGET_URL: "https://www.rendie.com/admin"
  

jobs:
  automation_job:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: node.js
    steps:
      - name: 1. 下载代码
        uses: actions/checkout@v6

      - name: 2. 环境配置
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: node.js/package-lock.json

      - name: 3. 安装依赖并启动
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends ttf-wqy-zenhei libgbm-dev
          npm ci --prefer-offline --no-audit
          npm start

      - name: 4. 任务清理
        if: always()
        run: |
          # 获取 3 天前的日期格式 (YYYY-MM-DD)
          DEL_DATE=$(date -d '3 days ago' +%Y-%m-%d)
          
          # 删除所有在 3 天前创建的已完成记录
          gh run list --status completed --created "<$DEL_DATE" --limit 100 --json databaseId --jq '.[].databaseId' | xargs -I {} gh run delete {} &
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}