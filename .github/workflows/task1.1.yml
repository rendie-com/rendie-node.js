name: 1.1 Shopee用户相关-4小时 (Cache高速版)

on:
  workflow_dispatch: 
  schedule:
    - cron: "0 */4 * * *"

permissions:
  contents: write
  actions: write

env:   
  TZ: Asia/Shanghai
  NODE_USERNAME: "4hour"
  NODE_ACCESS_TOKEN: ${{ secrets.NODE_ACCESS_TOKEN_1 }}
  NODE_REFRESH_TOKEN: "xxx"
  NODE_EXPIRES_IN: "1777047860"
  MAX_RUNTIME_MINUTES: 70
  TARGET_DIR: "error/task1"
  GITHUB_TOKEN: ${{ secrets.MY_PAT }}
  GITHUB_OWNER: "rendie-com"
  GITHUB_REPO: "rendie-node.js-error"
  TARGET_URL: "http://localhost:3000/admin"
  DB_01: "./sqlite3/shopee/采集箱"
  DB_02: "./sqlite3/shopee/聊聊"

jobs:
  automation_job:
    runs-on: ubuntu-latest
    timeout-minutes: 80 
    steps:
      - name: 1. 代码检出 (主程序与核心前端)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 2. 检出核心前端代码
        uses: actions/checkout@v4
        with:
          repository: rendie-com/rendie-next.js
          token: ${{ secrets.MY_PAT }}
          path: next.js
          fetch-depth: 1

      - name: 3. 数据库高速缓存还原 (DB_01)
        uses: actions/cache@v4
        with:
          path: ${{ env.DB_01 }}
          key: shopee-crawler-${{ github.run_id }}
          restore-keys: |
            shopee-crawler-

      - name: 4. 数据库高速缓存还原 (DB_02)
        uses: actions/cache@v4
        with:
          path: ${{ env.DB_02 }}
          key: shopee-chat-${{ github.run_id }}
          restore-keys: |
            shopee-chat-

      - name: 5. (备选) 初始数据库下载
        run: |
          if [ ! -d "${{ env.DB_01 }}" ] || [ -z "$(ls -A ${{ env.DB_01 }})" ]; then
            git clone --depth 1 https://${{ secrets.MY_PAT }}@github.com/rendie-com/rendie-sqlite3-shopee-crawler.git temp_db01
            mkdir -p "${{ env.DB_01 }}" && cp -af temp_db01/${{ env.DB_01 }}/. ${{ env.DB_01 }}/
          fi
          if [ ! -d "${{ env.DB_02 }}" ] || [ -z "$(ls -A ${{ env.DB_02 }})" ]; then
            git clone --depth 1 https://${{ secrets.MY_PAT }}@github.com/rendie-com/rendie-sqlite3-shopee-chat.git temp_db02
            mkdir -p "${{ env.DB_02 }}" && cp -af temp_db02/${{ env.DB_02 }}/. ${{ env.DB_02 }}/
          fi

      - name: 6. 环境准备
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: "**/package-lock.json"

      - name: 7. 构建并运行生产环境
        run: |
          # 并行安装依赖
          npm ci --prefix node.js --prefer-offline --no-audit &
          npm ci --prefix next.js --prefer-offline --no-audit &
          wait
          
          # 编译并启动
          npm run build --prefix next.js
          npm run start --prefix next.js & 
          
          cd node.js && npm run start
        env:
          NEXT_PUBLIC_DEFAULT_DB: "pg02" 
          NEXTJS_CONFIG_SQLITE: "../sqlite3/{database}.db"
          NEXTJS_CONFIG_PG02: ${{ secrets.NEXTJS_CONFIG_PG02 }}