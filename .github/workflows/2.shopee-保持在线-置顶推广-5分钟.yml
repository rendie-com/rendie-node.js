name: 2.shopee-保持在线-置顶推广-5分钟

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write
  actions: write

env:   
  TZ: Asia/Shanghai
  NODE_USERNAME: "5minute"
  NODE_ACCESS_TOKEN: ${{ secrets.NODE_ACCESS_TOKEN_2 }}
  MAX_RUNTIME_MINUTES: 3
  GITHUB_TOKEN: ${{ secrets.MY_PAT }}
  TARGET_DIR: "error/task2"
  TARGET_URL: "https://www.rendie.com/admin"
  TEMPLATE: "Shopee/定时任务/index.js&jsFile=js02"

jobs:
  automation_job:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.44.0-jammy
    timeout-minutes: 5
    defaults:
      run:
        working-directory: ./playwright

    steps:
      - name: 1. Checkout
        # 🌟 保持使用已经原生适配 Node 24 的 checkout 最新锁定版
        uses: actions/checkout@v4.2.2 
        with:
          fetch-depth: 1

      - name: 2. Setup Node.js (v24)
        # 🌟 核心修复：升级到全新的 v5 稳定版。
        # v5 的皮囊和灵魂已经默认全部基于 Node 24 打造，从根源上消灭了老旧的 node20 提示
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: './playwright/package.json' 

      - name: 3. Execution
        run: |
          npm i --no-save --prefer-offline --no-audit --no-fund --omit=optional --quiet
          xvfb-run --auto-servernum npm start