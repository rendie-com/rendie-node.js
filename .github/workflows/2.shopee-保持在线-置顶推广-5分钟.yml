name: 2.shopee-保持在线-置顶推广-5分钟

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write
  actions: write

env:   
  TZ: Asia/Shanghai
  NODE_USERNAME: "5minute"
  NODE_ACCESS_TOKEN: ${{ secrets.NODE_ACCESS_TOKEN_2 }}
  MAX_RUNTIME_MINUTES: 3
  GITHUB_TOKEN: ${{ secrets.MY_PAT }}
  TARGET_DIR: "error/task2"
  TARGET_URL: "https://www.rendie.com/admin"
  TEMPLATE: "Shopee/定时任务/index.js&jsFile=js02"

jobs:
  automation_job:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy # 👍 1.60.0 完美咬合，秒起运行
    timeout-minutes: 5
    defaults:
      run:
        working-directory: ./playwright

    steps:
      - name: 1. Checkout
        # 🌟 终极修改：直接连跨两代，换成官方在 2026 年全面转投 Node 24 打造的最新一代主流版本
        # 这次它的底层皮囊和声明都是纯正的 Node 24，GitHub 绝无借口再报任何警告
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 2. Setup Node.js (v24)
        # 🌟 配合上一步的 v5，外壳内核全部清一色对齐 Node 24
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: './playwright/package.json' 

      - name: 3. Execution
        run: |
          npm i --no-save --prefer-offline --no-audit --no-fund --omit=optional --quiet
          xvfb-run --auto-servernum npm start