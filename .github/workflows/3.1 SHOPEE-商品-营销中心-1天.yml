name: 3.1 SHOPEE-商品-营销中心-1天

on:
  workflow_dispatch: 
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write
  actions: write

env:   
  TZ: Asia/Shanghai
  NODE_USERNAME: "1day"
  NODE_ACCESS_TOKEN: ${{ secrets.NODE_ACCESS_TOKEN_3 }}
  MAX_RUNTIME_MINUTES: 1
  TARGET_DIR: "error/task3"
  GITHUB_TOKEN: ${{ secrets.MY_PAT }}
  TARGET_URL: "http://localhost:3000/admin"
  TEMPLATE: "Shopee/任务/index.js&jsFile=js02"
  DB_01: "sqlite3/shopee/营销中心"
  DB_02: "sqlite3/shopee/商品"

jobs:
  automation_job:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
    timeout-minutes: 60 
    steps:
      - name: 1. 下载主程序代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 2. 下载核心前端代码
        uses: actions/checkout@v6
        with:
          repository: rendie-com/rendie-next.js
          token: ${{ secrets.MY_PAT }}
          path: next.js
          fetch-depth: 1

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: |
            ~/.npm
            next.js/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('next.js/**/*.{js,jsx,ts,tsx}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: 3. 【shopee/营销中心/】数据库还原 (只读读档)
        uses: actions/cache/restore@v5 # 改为只读还原，防止干扰最后的保存
        with:
          path: ${{ env.DB_01 }}
          key: shopee-marketing-
          restore-keys: |
            shopee-marketing-

      - name: 4. 【shopee/商品/】数据库还原 (只读读档)
        uses: actions/cache/restore@v5 # 改为只读还原
        with:
          path: ${{ env.DB_02 }}
          key: shopee-product-
          restore-keys: |
            shopee-product-

      - name: 5. 数据库状态检查与同步
        run: |
          # 检查 DB_01 (营销中心)
          if [ -d "${{ env.DB_01 }}" ] && [ "$(ls -A ${{ env.DB_01 }} 2>/dev/null)" ]; then
            echo "✅ [DB_01] 还原成功，跳过下载。"
          else
            echo "⚠️ [DB_01] 还原失效，正在从远程同步历史数据..."
            git clone --depth 1 https://x-access-token:${{ secrets.MY_PAT }}@github.com/rendie-com/rendie-sqlite3-shopee-marketing temp_db_01
            mkdir -p "${{ env.DB_01 }}"
            cp -af temp_db_01/${{ env.DB_01 }}/. "${{ env.DB_01 }}/"
            rm -rf temp_db_01
          fi

          # 检查 DB_02 (商品)
          if [ -d "${{ env.DB_02 }}" ] && [ "$(ls -A ${{ env.DB_02 }} 2>/dev/null)" ]; then
            echo "✅ [DB_02] 还原成功，跳过下载。"
          else
            echo "⚠️ [DB_02] 还原失效，正在从远程同步历史数据..."
            git clone --depth 1 https://x-access-token:${{ secrets.MY_PAT }}@github.com/rendie-com/rendie-sqlite3-shopee-product temp_db_02
            mkdir -p "${{ env.DB_02 }}"
            cp -af temp_db_02/${{ env.DB_02 }}/. "${{ env.DB_02 }}/"
            rm -rf temp_db_02
          fi

      - name: 6. 环境准备 (Node.js 24)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: |
            playwright/package-lock.json
            next.js/package-lock.json

      - name: 7. 构建并运行生产环境
        env:
          NEXT_PUBLIC_DEFAULT_DB: "pg02" 
          NEXTJS_CONFIG_SQLITE: "../sqlite3/{database}.db"
          NEXTJS_CONFIG_PG02: ${{ secrets.NEXTJS_CONFIG_PG02 }}
        run: |
          # 并行安装系统库与依赖
          npm ci --prefix playwright --prefer-offline --no-audit & 
          npm ci --prefix next.js --prefer-offline --no-audit &
          wait
          
          # 构建与启动
          npm run build --prefix next.js
          npm run start --prefix next.js & 
          
          sleep 10
          cd playwright && npm run start

      # ================= 硬核回写：任务完成后强制覆盖保存最新数据 =================
      - name: 8. 【shopee/营销中心/】强制保存最新数据库到缓存
        if: always() # 确保即使业务脚本报错，之前的数据库更改也能被安全保存
        uses: actions/cache/save@v5
        with:
          path: ${{ env.DB_01 }}
          # 附加精确到分钟的时间戳，迫使 GitHub 必须接受这个新缓存
          key: shopee-marketing-${{ github.run_id }}-${{ github.run_attempt }}

      - name: 9. 【shopee/商品/】强制保存最新数据库到缓存
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ${{ env.DB_02 }}
          key: shopee-product-${{ github.run_id }}-${{ github.run_attempt }}