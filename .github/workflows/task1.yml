name: 1.shopee/粉丝-4小时

on:
  workflow_dispatch: 

env:  
  TZ: Asia/Shanghai

permissions:
  contents: write
  actions: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 下载 rendie-next.js
        uses: actions/checkout@v4
        with:
          repository: rendie-com/rendie-next.js
          token: ${{ secrets.MY_PAT }}
          path: rendie-nextjs
          ref: main

      - name: 启动 Next.js (开发模式)
        working-directory: ./rendie-nextjs
        run: |   
          pnpm install --no-frozen-lockfile
          # 使用 dev 模式启动，跳过生产构建的严格检查
          pnpm run dev & 
        env:
          NEXTJS_CONFIG_DEFAULT_DB: ${{ secrets.NEXTJS_CONFIG_DEFAULT_DB }}  
          NEXTJS_CONFIG_SQLITE: ${{ secrets.NEXTJS_CONFIG_SQLITE }} 

      - name: 安装浏览器系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ttf-wqy-zenhei libgbm-dev
          
      - name: 运行 index.js 脚本
        run: |
          pnpm install 
          node index.js
        env:
          # 登录凭据
          NODE_USERNAME: "admin"
          NODE_ACCESS_TOKEN: ${{ secrets.NODE_ACCESS_TOKEN_1 }}
          NODE_REFRESH_TOKEN: ${{ secrets.NODE_REFRESH_TOKEN_1 }}
          NODE_EXPIRES_IN: "1777047860"
          
          # 业务 JSON
          NODE_MENU_LIST: '{"top1":1,"top2":{"23":{"name":"任务","id":"23","isbool":true,"url":"http://localhost:3000/view/Default/admin/html/iframe.html?template=Shopee/任务/index.js&jsFile=js02&return=%2Fview%2FDefault%2Fadmin%2Fhtml%2Fiframe.html%3Ftemplate%3DShopee%2F%25E4%25BB%25BB%25E5%258A%25A1%2Findex.js%26jsFile%3Djs04"}}}'
          
          # 运行配置：由于 dev 模式占用 CPU 高，建议至少保持 3 分钟
          MAX_RUNTIME_MINUTES: 0.1
          TARGET_DIR: "error/task1"
          GITHUB_ACTIONS: "true"
          
          # 截图上传
          GITHUB_TOKEN: ${{ secrets.MY_PAT }}
          GITHUB_OWNER: "rendie-com"
          GITHUB_REPO: "rendie-node.js-error"

      - name: 删除过往运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 1
          keep_minimum_runs: 0