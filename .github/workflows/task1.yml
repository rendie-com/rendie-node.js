name: 1.shopee/粉丝-4小时

on:
  workflow_dispatch: 

env:  
  TZ: Asia/Shanghai

permissions:
  contents: write
  actions: write

jobs:
  automation-task:
    runs-on: ubuntu-latest
    steps:
      - name: ⚙️ 环境初始化
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🛠️ 安装 pnpm 环境
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 📦 准备 Node 运行时
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: 📂 拉取前端核心
        uses: actions/checkout@v4
        with:
          repository: rendie-com/rendie-next.js
          token: ${{ secrets.MY_PAT }}
          path: rendie-nextjs
          ref: main

      - name: 🌐 缓存资产 (浏览器/编译产物)
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/.cache/puppeteer
            rendie-nextjs/.next/cache
          key: ${{ runner.os }}-assets-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-assets-

      - name: 🖼️ 补齐系统依赖
        # 不跑 update 直接安装，确保中文字体可用
        run: sudo apt-get install -y --no-install-recommends ttf-wqy-zenhei libgbm-dev

      - name: ⚡ 极速启动服务 (绝对路径锁定模式)
        run: |
          # 1. 确保根目录依赖就绪
          echo "📦 正在安装根目录依赖..."
          pnpm install --frozen-lockfile
          
          # 2. 确保 Next.js 目录依赖就绪 (使用 --dir 强制指向子目录)
          echo "📦 正在安装 Next.js 依赖..."
          pnpm install --dir ./rendie-nextjs --no-frozen-lockfile
          
          # 3. 预下载浏览器内核
          echo "🌐 准备浏览器内核..."
          npx puppeteer browsers install chrome
          
          # 4. 后台启动 Next.js (锁定在子目录运行)
          echo "🚀 启动服务中..."
          pnpm --dir ./rendie-nextjs run dev & 
          
          # 5. 智能等待：端口通了立刻开始，最长等 120 秒
          echo "⏳ 等待 localhost:3000 就绪..."
          npx wait-on http://localhost:3000 --timeout 120000
          
          echo "🔥 端口已通，开始运行 index.js"
          node index.js
        env:
          NEXTJS_CONFIG_DEFAULT_DB: ${{ secrets.NEXTJS_CONFIG_DEFAULT_DB }}  
          NEXTJS_CONFIG_SQLITE: ${{ secrets.NEXTJS_CONFIG_SQLITE }} 
          NODE_USERNAME: "admin"
          NODE_ACCESS_TOKEN: ${{ secrets.NODE_ACCESS_TOKEN_1 }}
          NODE_REFRESH_TOKEN: ${{ secrets.NODE_REFRESH_TOKEN_1 }}
          NODE_EXPIRES_IN: "1777047860"
          NODE_MENU_LIST: '{"top1":1,"top2":{"23":{"name":"任务","id":"23","isbool":true,"url":"http://localhost:3000/view/Default/admin/html/iframe.html?template=Shopee/任务/index.js&jsFile=js02&return=%2Fview%2FDefault%2Fadmin%2Fhtml%2Fiframe.html%3Ftemplate%3DShopee%2F%25E4%25BB%25BB%25E5%258A%25A1%2Findex.js%26jsFile%3Djs04"}}}'
          
          MAX_RUNTIME_MINUTES: 0.1
          TARGET_DIR: "error/task1"
          GITHUB_ACTIONS: "true"
          
          # 截图上传配置
          GITHUB_TOKEN: ${{ secrets.MY_PAT }}
          GITHUB_OWNER: "rendie-com"
          GITHUB_REPO: "rendie-node.js-error"

      - name: 🧹 清理流水线日志
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 1
          keep_minimum_runs: 0