name: 粉丝-聊聊-每4小时执行

on:
  workflow_dispatch: 
  # schedule:
  #   - cron: "0 */4 * * *"

env:  
  TZ: Asia/Shanghai

permissions:
  contents: write
  actions: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # - name: 下载 rendie-nextjs
      #   uses: actions/checkout@v4
      #   with:
      #     repository: rendie-com/rendie-nextjs
      #     token: ${{ secrets.MY_PAT }}
      #     path: rendie-nextjs
      #     ref: master

      # - name: 启动 Next.js
      #   run: |   
      #     cd ./rendie-nextjs/
      #     pnpm i
      #     pnpm run dev & 
      #   env:
      #     GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      #     PROXY_URL: ${{ secrets.PROXY_URL }}
      #     NEXTJS_CONFIG_DEFAULT_DB: ${{ secrets.NEXTJS_CONFIG_DEFAULT_DB }}  
      #     NEXTJS_CONFIG_SQLITE: ${{ secrets.NEXTJS_CONFIG_SQLITE }} 

      # - name: 安装系统依赖
      #   run: |
      #     sudo apt-get update -qq
      #     sudo apt-get install -y --no-install-recommends ttf-wqy-zenhei libgbm-dev
          
      - name: 运行 粉丝-聊聊 脚本
        run: |
          # 1. 物理创建目录
          mkdir -p error/task1
          
          # # 2. 运行业务脚本
          # pnpm i
          # node index.js
          
          # 3. 强制产生文件差异，确保部署永远生效
          echo "Last Run: $(date)" > error/task1/sync-check.txt
          
          # 4. 打印目录确认文件生成状态
          echo "📂 待部署文件清单："
          ls -R error/task1
        env:
          MAX_RUNTIME_MINUTES: 0.1
          TARGET_DIR: "error/task1"
          NODE_USERNAME: "4hour"
          NODE_TASK_URL: "http://localhost:3000/view/Default/admin/html/iframe.html?template=Shopee/任务/index.js&jsFile=js02"
          NODE_ACCESS_TOKEN: ${{ secrets.NODE_ACCESS_TOKEN_1 }}  
          NODE_REFRESH_TOKEN: ${{ secrets.NODE_REFRESH_TOKEN_1 }}
          
      - name: Deploy Logs 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # 修改点：指向 error 根目录
          folder: error
          branch: main
          # 远程也存放在 error 目录下，这样能保留 task1/task2 等子结构
          target-folder: error
          # 强制单次提交覆盖，解决 Git 冲突
          single-commit: true
          # 设为 false，防止 task1 运行时删掉 task2 已经上传的截图
          clean: false 
          commit-message: "logs: 自动保存运行截图 [skip ci]"

      - name: 删除运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 1
          keep_minimum_runs: 0