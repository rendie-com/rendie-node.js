name: task1-粉丝-聊聊-每4小时执行

on:
  workflow_dispatch: 

env:  
  TZ: Asia/Shanghai

permissions:
  contents: write
  actions: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 下载 rendie-next.js
        uses: actions/checkout@v4
        with:
          repository: rendie-com/rendie-next.js
          token: ${{ secrets.MY_PAT }}
          path: rendie-nextjs
          ref: main

      - name: 下载 rendie-sqlite3-system
        uses: actions/checkout@v4
        with:
          repository: rendie-com/rendie-sqlite3-system
          token: ${{ secrets.MY_PAT }}
          path: sqlite3
          ref: main

      - name: 启动 Next.js
        run: |   
          cd ./rendie-nextjs/
          pnpm i
          pnpm run dev & 
        env:
          NEXTJS_CONFIG_DEFAULT_DB: ${{ secrets.NEXTJS_CONFIG_DEFAULT_DB }}  
          NEXTJS_CONFIG_SQLITE: ${{ secrets.NEXTJS_CONFIG_SQLITE }} 

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ttf-wqy-zenhei libgbm-dev
          
      - name: 运行 粉丝-聊聊 脚本
        run: |
          pnpm i
          node index.js
        env:
          # 核心业务变量
          NODE_USERNAME: "4hour"
          NODE_ACCESS_TOKEN: ${{ secrets.NODE_ACCESS_TOKEN_1 }}  
          NODE_REFRESH_TOKEN: ${{ secrets.NODE_REFRESH_TOKEN_1 }}
          NODE_TASK_URL: "http://localhost:3000/view/Default/admin/html/iframe.html?template=Shopee/任务/index.js&jsFile=js02"
          
          # 运行监控变量
          MAX_RUNTIME_MINUTES: 1
          TARGET_DIR: "error/task1"
          GITHUB_ACTIONS: "true"
          
          # GitHub 上传变量 (已全部改用 MY_PAT)
          GITHUB_TOKEN: ${{ secrets.MY_PAT }}
          GITHUB_OWNER: "rendie-com"
          GITHUB_REPO: "rendie-node.js-error"

      - name: 删除运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 1
          keep_minimum_runs: 0