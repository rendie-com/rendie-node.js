name: 粉丝-聊聊-每4小时执行

on:
  workflow_dispatch: 
  # schedule:
  #   - cron: "0 */4 * * *"

env:  
  TZ: Asia/Shanghai

permissions:
  contents: write
  actions: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 下载 rendie-nextjs
        uses: actions/checkout@v4
        with:
          repository: rendie-com/rendie-nextjs
          token: ${{ secrets.MY_PAT }}
          path: rendie-nextjs
          ref: master

      - name: 启动 Next.js
        run: |   
          cd ./rendie-nextjs/
          pnpm i
          pnpm run dev & 
          sleep 10 # 等待服务启动
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          NEXTJS_CONFIG_DEFAULT_DB: ${{ secrets.NEXTJS_CONFIG_DEFAULT_DB }}  
          NEXTJS_CONFIG_SQLITE: ${{ secrets.NEXTJS_CONFIG_SQLITE }} 

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ttf-wqy-zenhei libgbm-dev
          
      - name: 运行 粉丝-聊聊 脚本
        run: |
          # 1. 物理创建目录
          mkdir -p error/task1
          
          # 2. 运行原本的脚本
          pnpm i
          node index.js
          
          # 3. 【新增测试文件】生成一个绝对不会重复的测试文件
          echo "测试时间: $(date)" > error/task1/test-$(date +%H%M%S).txt
          
          # 4. 打印目录确认文件存在
          echo "📂 当前目录下的文件："
          ls -R error/task1
        env:
          MAX_RUNTIME_MINUTES: 1 # 测试阶段设为 1，正式运行改回 30
          TARGET_DIR: "error/task1"
          NODE_USERNAME: "4hour"
          NODE_TASK_URL: "http://localhost:3000/view/Default/admin/html/iframe.html?template=Shopee/任务/index.js&jsFile=js02"
          NODE_ACCESS_TOKEN: ${{ secrets.NODE_ACCESS_TOKEN_1 }}  
          NODE_REFRESH_TOKEN: ${{ secrets.NODE_REFRESH_TOKEN_1 }}
          
      - name: Deploy Logs 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # 本地源目录
          folder: error/task1
          # 目标分支
          branch: main
          # 目标远程目录
          target-folder: error/task1
          # --- 关键修复参数 ---
          # 强制单次提交，解决 fatal: 'main' is already used 冲突
          single-commit: true
          # 确保清理掉旧的、不再需要的日志文件
          clean: true
          commit-message: "logs: 自动保存截图 [skip ci]"

      - name: 删除运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 1
          keep_minimum_runs: 0