name: 1.shopee/粉丝-4小时

on:
  workflow_dispatch: 

env:  
  TZ: Asia/Shanghai

permissions:
  contents: write
  actions: write

jobs:
  automation:
    runs-on: ubuntu-latest
    steps:
      - name: ⚙️ 环境初始化
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🛠️ 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 📦 准备 Node 环境 (双目录缓存)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          # 这样写可以同时监控根目录和子目录的锁文件变动
          cache-dependency-path: |
            ./pnpm-lock.yaml
            rendie-nextjs/pnpm-lock.yaml

      - name: 📂 拉取前端核心
        uses: actions/checkout@v4
        with:
          repository: rendie-com/rendie-next.js
          token: ${{ secrets.MY_PAT }}
          path: rendie-nextjs
          ref: main

      - name: 🌐 缓存 Next 编译成果
        uses: actions/cache@v4
        with:
          path: rendie-nextjs/.next/cache
          key: ${{ runner.os }}-next-cache-${{ hashFiles('rendie-nextjs/pnpm-lock.yaml') }}

      - name: 🖼️ 补齐系统字体
        run: sudo apt-get install -y --no-install-recommends ttf-wqy-zenhei libgbm-dev

      - name: 🚀 安装并启动服务
        run: |
          # 1. 严格顺序安装，彻底避免路径冲突报错
          echo "📦 安装根目录依赖..."
          pnpm install --frozen-lockfile
          
          echo "📦 安装 Next.js 依赖..."
          cd rendie-nextjs && pnpm install --frozen-lockfile && cd ..
          
          echo "🌐 准备浏览器..."
          npx puppeteer browsers install chrome
          
          # 2. 后台启动服务
          echo "🚀 启动 Next.js..."
          cd rendie-nextjs && pnpm run dev &
          
          # 3. 智能等待
          echo "⏳ 等待 localhost:3000..."
          npx wait-on http://localhost:3000 --timeout 120000
          
          # 4. 执行脚本
          echo "🔥 开始运行 index.js"
          cd .. && node index.js
        env:
          NEXTJS_CONFIG_DEFAULT_DB: ${{ secrets.NEXTJS_CONFIG_DEFAULT_DB }}  
          NEXTJS_CONFIG_SQLITE: ${{ secrets.NEXTJS_CONFIG_SQLITE }} 
          NODE_USERNAME: "admin"
          NODE_ACCESS_TOKEN: ${{ secrets.NODE_ACCESS_TOKEN_1 }}
          NODE_REFRESH_TOKEN: ${{ secrets.NODE_REFRESH_TOKEN_1 }}
          NODE_EXPIRES_IN: "1777047860"
          NODE_MENU_LIST: '{"top1":1,"top2":{"23":{"name":"任务","id":"23","isbool":true,"url":"http://localhost:3000/view/Default/admin/html/iframe.html?template=Shopee/任务/index.js&jsFile=js02&return=%2Fview%2FDefault%2Fadmin%2Fhtml%2Fiframe.html%3Ftemplate%3DShopee%2F%25E4%25BB%25BB%25E5%258A%25A1%2Findex.js%26jsFile%3Djs04"}}}'
          MAX_RUNTIME_MINUTES: 0.1
          TARGET_DIR: "error/task1"
          GITHUB_ACTIONS: "true"
          GITHUB_TOKEN: ${{ secrets.MY_PAT }}
          GITHUB_OWNER: "rendie-com"
          GITHUB_REPO: "rendie-node.js-error"

      - name: 🧹 清理流水线日志
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 1
          keep_minimum_runs: 0