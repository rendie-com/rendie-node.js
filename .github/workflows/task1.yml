name: 1.Shopee用户相关-4小时

on:
  workflow_dispatch: 
  schedule:
    - cron: "0 */4 * * *"
permissions:
  contents: write
  actions: write

env:   
  TZ: Asia/Shanghai
  NODE_USERNAME: "4hour"
  NODE_ACCESS_TOKEN: ${{ secrets.NODE_ACCESS_TOKEN_1 }}
  NODE_REFRESH_TOKEN: ${{ secrets.NODE_REFRESH_TOKEN_1 }}
  NODE_EXPIRES_IN: "1777047860"
  MAX_RUNTIME_MINUTES: 30
  TARGET_DIR: "error/task1"
  GITHUB_TOKEN: ${{ secrets.MY_PAT }}
  GITHUB_OWNER: "rendie-com"
  GITHUB_REPO: "rendie-node.js-error"
  NODE_MENU_LIST: '{"top1":1,"top2":{"23":{"name":"任务","id":"23","isbool":true,"url":"http://localhost:3000/view/Default/admin/html/iframe.html?template=Shopee/任务/index.js&jsFile=js02&return=%2Fview%2FDefault%2Fadmin%2Fhtml%2Fiframe.html%3Ftemplate%3DShopee%2F%25E4%25BB%25BB%25E5%258A%25A1%2Findex.js%26jsFile%3Djs04"}}}'

jobs:
  automation_job:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 下载代码
        uses: actions/checkout@v6

      - name: 2. 下载核心代码(rendie-nextjs)
        uses: actions/checkout@v6
        with:
          repository: rendie-com/rendie-next.js
          token: ${{ secrets.MY_PAT }}
          path: next.js

      - name: 3. 下载sqlite3数据库
        uses: actions/checkout@v6
        with:
          repository: rendie-com/rendie-sqlite3-system
          token: ${{ secrets.MY_PAT }}
          path: db01

      - name: 3. 下载sqlite3数据库
        uses: actions/checkout@v6
        with:
          repository: rendie-com/rendie-sqlite3-shopee-crawler
          token: ${{ secrets.MY_PAT }}
          path: db02

      - name: 4. 安装 Node.js 环境
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: |
            node.js/package-lock.json
            next.js/package-lock.json

      - name: 5. 并行安装与启动
        run: |
          # 合并数据库并清理临时目录
          [ -d "./db01" ] && cp -rn ./db01/* . && rm -rf db01
          [ -d "./db02" ] && cp -rn ./db02/* . && rm -rf db02

          # A. 后台安装中文字体
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ttf-wqy-zenhei libgbm-dev -qq &
          PID_APT=$!

          # B. 安装后端依赖
          npm ci --prefix node.js --prefer-offline --no-audit &
          PID_MAIN=$!
          
          # C. 安装前端依赖
          npm ci --prefix next.js --prefer-offline --no-audit &
          PID_NEXT=$!
          
          wait $PID_APT $PID_MAIN $PID_NEXT
          
          echo "✅ 所有环境与依赖已就绪"

          # D. 启动前端服务 (后台运行)
          npm run dev --prefix next.js & 
          
          sleep 10
          
          # E. 启动后端主程序 (切换进目录确保 .env 正确加载)
          cd node.js && npm run start
        env:
          NEXTJS_CONFIG_DEFAULT_DB: ${{ secrets.NEXTJS_CONFIG_DEFAULT_DB }}  
          NEXTJS_CONFIG_SQLITE: ${{ secrets.NEXTJS_CONFIG_SQLITE }} 

      - name: 6. 任务结束：清理历史日志
        if: always()
        run: |
          gh run list --status completed --limit 30 --json databaseId --jq '.[].databaseId' | xargs -I {} gh run delete {}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}