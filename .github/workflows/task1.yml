name: 粉丝-聊聊-每4小时执行

on:
  workflow_dispatch: 
  # schedule:
  #   - cron: "0 */4 * * *" # 调试成功后删除 # 开启定时

env:  
  TZ: Asia/Shanghai

permissions:
  contents: write
  actions: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 下载 rendie-nextjs
        uses: actions/checkout@v4
        with:
          repository: rendie-com/rendie-nextjs
          token: ${{ secrets.MY_PAT }}
          path: rendie-nextjs
          ref: master

      - name: 启动 Next.js
        run: |   
          cd ./rendie-nextjs/
          pnpm i
          pnpm run dev & 
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          NEXTJS_CONFIG_DEFAULT_DB: ${{ secrets.NEXTJS_CONFIG_DEFAULT_DB }}  
          NEXTJS_CONFIG_SQLITE: ${{ secrets.NEXTJS_CONFIG_SQLITE }} 

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ttf-wqy-zenhei libgbm-dev
          
      - name: 运行 粉丝-聊聊 脚本
        run: |
          # 1. 物理层保底创建隔离目录
          mkdir -p error/task1
          pnpm i
          node index.js
        env:
          # 运行参数
          MAX_RUNTIME_MINUTES: 1
          TARGET_DIR: "error/task1"
          # 任务身份与目标
          NODE_USERNAME: "4hour"
          NODE_TASK_URL: "http://localhost:3000/view/Default/admin/html/iframe.html?template=Shopee/任务/index.js&jsFile=js02"
          # 授权信息 (Secrets)
          NODE_ACCESS_TOKEN: ${{ secrets.NODE_ACCESS_TOKEN_1 }}  
          NODE_REFRESH_TOKEN: ${{ secrets.NODE_REFRESH_TOKEN_1 }}
          
      - name: Deploy Logs 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # 部署本地 task1 目录下的截图
          folder: error/task1
          branch: main
          # 推送到远程仓库的相应位置
          target-folder: error/task1
          commit-message: "logs: 任务1-粉丝聊聊 自动存档 [skip ci]"

      - name: 删除旧记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 1
          keep_minimum_runs: 0