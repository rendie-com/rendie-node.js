name: 2.shopee-5min-task

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write
  actions: write

env:   
  TZ: Asia/Shanghai
  NODE_USERNAME: "5minute"
  NODE_ACCESS_TOKEN: ${{ secrets.NODE_ACCESS_TOKEN_2 }}
  NODE_REFRESH_TOKEN: ${{ secrets.NODE_REFRESH_TOKEN_2 }}
  NODE_EXPIRES_IN: "1777047860"
  MAX_RUNTIME_MINUTES: 3
  TARGET_DIR: "error/task2"
  GITHUB_TOKEN: ${{ secrets.MY_PAT }}
  GITHUB_OWNER: "rendie-com"
  GITHUB_REPO: "rendie-node.js-error"
  TARGET_URL: "https://www.rendie.com/admin"

jobs:
  automation_job:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: ./node.js  # 统一设置工作目录，减少 cd 命令

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4 # 建议使用稳定版 v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'node.js/package-lock.json'

      - name: 3. Install & Run
        run: |
          npm ci --prefer-offline --no-audit --no-fund
          npm run start