name: 2.shopee-保持在线-置顶推广-5分钟

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write
  actions: write

env:   
  TZ: Asia/Shanghai
  NODE_USERNAME: "5minute"
  NODE_ACCESS_TOKEN: ${{ secrets.NODE_ACCESS_TOKEN_2 }}
  NODE_REFRESH_TOKEN: ${{ secrets.NODE_REFRESH_TOKEN_2 }}
  NODE_EXPIRES_IN: "1777047860"
  MAX_RUNTIME_MINUTES: 3
  TARGET_DIR: "error/task2"
  GITHUB_TOKEN: ${{ secrets.MY_PAT }}
  GITHUB_OWNER: "rendie-com"
  GITHUB_REPO: "rendie-node.js-error"
  NODE_MENU_LIST: '{"top1":1,"top2":{"23":{"name":"任务","id":"23","isbool":true,"url":"https://www.rendie.com/view/Default/admin/html/iframe.html?template=Shopee/任务/index.js&jsFile=js02&return=%2Fview%2FDefault%2Fadmin%2Fhtml%2Fiframe.html%3Ftemplate%3DShopee%2F%25E4%25BB%25BB%25E5%258A%25A1%2Findex.js%26jsFile%3Djs04"}}}'

jobs:
  automation_job:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 2. 环境准备
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'node.js/package-lock.json'

      - name: 3. 安装依赖 (并行)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends libgbm-dev fonts-wqy-zenhei -qq &
          PID_APT=$!
          cd node.js && npm ci --prefer-offline --no-audit --no-fund &
          PID_NPM=$!
          wait $PID_APT $PID_NPM

      - name: 4. 运行主程序
        run: |
          cd node.js
          npm run start