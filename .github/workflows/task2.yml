name: 每4小时执行 RENDIE 任务

on:
  workflow_dispatch: 
 # schedule:
  #  - cron: "0 */4 * * *" # 每4小时执行一次

env:  
  TZ: Asia/Shanghai

permissions:
  contents: write
  actions: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出当前仓库
      - name: Checkout 🛎️
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 运行 粉丝-聊聊 脚本
        run: |
                # 1. 物理创建目录
                mkdir -p error
                echo "Last Run: $(date)" > error/sync-check.txt
                
      # 6. 部署到 main 分支 🚀 (仅保留 error 目录中的截图)
      - name: Deploy to Main 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: error             # <--- 关键修改：只上传 error 文件夹的内容
          branch: main              # 推送到主分支
          target-folder: error      # 存放在主分支的 error 目录下