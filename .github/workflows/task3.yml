name: Deploy to External Repo

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pushes to another repository
        uses: cpina/github-action-push-to-another-repository@main
        env:
          # 必须在 Secrets 中配置此 Token
          API_TOKEN_GITHUB: ${{ secrets.MY_PAT }}
        with:
          # 源目录，'.' 代表整个项目
          source-directory: '.'
          # 目标 GitHub 用户名
          destination-github-username: 'rendie-com'
          # 目标仓库名
          destination-repository-name: 'rendie-chrome'
          # 目标分支
          target-branch: 'master'
          # 提交者邮箱
          user-email: github-actions[bot]@users.noreply.github.com
          # 提交记录信息
          commit-message: "Auto-deploy from source repo: $GITHUB_REF"