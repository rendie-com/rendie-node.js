name: 每4小时执行 RENDIE 任务

on:
  workflow_dispatch: 
  schedule:
    - cron: "0 */4 * * *" # 每4小时执行一次

env:  
  TZ: Asia/Shanghai

permissions:
  contents: write
  actions: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出当前仓库
      - name: Checkout 🛎️
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2. 环境准备 (pnpm & Node)
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. 运行中转 Next.js (如果 index.js 依赖它提供的 API)
      - name: 下载 rendie-nextjs
        uses: actions/checkout@v4
        with:
          repository: rendie-com/rendie-nextjs
          token: ${{ secrets.MY_PAT }}
          path: rendie-nextjs
          ref: master
          fetch-depth: 1

      - name: 启动 Next.js
        run: |   
          cd ./rendie-nextjs/
          pnpm i
          pnpm run dev & 
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          NEXTJS_CONFIG_DEFAULT_DB: ${{ secrets.NEXTJS_CONFIG_DEFAULT_DB }}  
          NEXTJS_CONFIG_PG01: ${{ secrets.NEXTJS_CONFIG_PG01 }}  
          NEXTJS_CONFIG_PG02: ${{ secrets.NEXTJS_CONFIG_PG02 }} 
          NEXTJS_CONFIG_SQLITE: ${{ secrets.NEXTJS_CONFIG_SQLITE }} 

      # 4. 系统环境补全 (用于无头浏览器截图)
      - name: 安装中文字体及依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ttf-wqy-zenhei libgbm-dev
          
      # 5. 执行业务逻辑
      - name: 运行任务脚本
        run: |
          pnpm i
          node index.js
        env:
          MAX_RUNTIME_MINUTES: ${{ secrets.MAX_RUNTIME_MINUTES }}
          NODE_SHOPEE_NAME: ${{ secrets.NODE_SHOPEE_NAME }}
          NODE_TASK_URL: ${{ secrets.NODE_TASK_URL }}
          NODE_SHOPEE_ACCESS_TOKEN: ${{ secrets.NODE_SHOPEE_ACCESS_TOKEN }}  
          NODE_SHOPEE_REFRESH_TOKEN: ${{ secrets.NODE_SHOPEE_REFRESH_TOKEN }}
          
      # 6. 部署到 main 分支 🚀 (仅保留 error 目录中的截图)
      - name: Deploy to Main 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: error             # <--- 关键修改：只上传 error 文件夹的内容
          branch: main              # 推送到主分支
          target-folder: error      # 存放在主分支的 error 目录下
          commit-message: "logs: 自动保存运行截图 [skip ci]" # 必须带上 [skip ci]

      # 7. 清理运行历史
      - name: 删除运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 1
          keep_minimum_runs: 0