name: 用pnpm运行next.js

on:
  workflow_dispatch: 

permissions:
  contents: write
  actions: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出当前仓库
      - name: Checkout 🛎️
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📂 拉取前端核心
        uses: actions/checkout@v4
        with:
          repository: rendie-com/rendie-next.js
          token: ${{ secrets.MY_PAT }}
          path: rendie-next.js
          ref: main

      - name: 🚀 启动服务与执行脚本
        run: |
          cd rendie-next.js
          npm i          
          npm run dev