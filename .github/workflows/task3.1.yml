name: 3.1 SHOPEE-商品-营销中心-1天 (Cache高速版)

on:
  workflow_dispatch: 
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write
  actions: write

env:   
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_USERNAME: "1day"
  NODE_ACCESS_TOKEN: ${{ secrets.NODE_ACCESS_TOKEN_3 }}
  MAX_RUNTIME_MINUTES: 70
  TARGET_DIR: "error/task3"
  GITHUB_TOKEN: ${{ secrets.MY_PAT }}
  TARGET_URL: "http://localhost:3000/admin"
  TEMPLATE: "Shopee/任务/index.js&jsFile=js02"
  DB_01: "./sqlite3/shopee/营销中心"
  DB_02: "./sqlite3/shopee/商品"

jobs:
  automation_job:
    runs-on: ubuntu-latest
    timeout-minutes: 80 
    steps:
      - name: 1. 下载主程序代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 2. 下载核心前端代码
        uses: actions/checkout@v6
        with:
          repository: rendie-com/rendie-next.js
          token: ${{ secrets.MY_PAT }}
          path: next.js
          fetch-depth: 1

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: |
            ~/.npm
            next.js/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('next.js/**/*.{js,jsx,ts,tsx}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: 3. 【shopee/营销中心/】数据库还原 (读档)
        uses: actions/cache@v5
        with:
          path: ${{ env.DB_01 }}
          key: shopee-marketing-${{ github.run_id }}
          restore-keys: |
            shopee-marketing-

      - name: 4. 【shopee/商品/】数据库还原 (读档)
        uses: actions/cache@v5
        with:
          path: ${{ env.DB_02 }}
          key: shopee-product-${{ github.run_id }}
          restore-keys: |
            shopee-product-

      - name: 5. 数据库状态检查与同步
        run: |
          # 检查 DB_01 (营销中心)
          if [ -d "${{ env.DB_01 }}" ] && [ "$(ls -A ${{ env.DB_01 }} 2>/dev/null)" ]; then
            echo "✅ [DB_01] 缓存命中，跳过下载。"
          else
            echo "⚠️ [DB_01] 缓存失效，正在下载初始数据..."
            git clone --depth 1 https://x-access-token:${{ secrets.MY_PAT }}@github.com/rendie-com/rendie-sqlite3-shopee-marketing temp_db_01
            mkdir -p ${{ env.DB_01 }}
            cp -af temp_db_01/${{ env.DB_01 }}/. ${{ env.DB_01 }}/
            rm -rf temp_db_01
          fi

          # 检查 DB_02 (商品)
          if [ -d "${{ env.DB_02 }}" ] && [ "$(ls -A ${{ env.DB_02 }} 2>/dev/null)" ]; then
            echo "✅ [DB_02] 缓存命中，跳过下载。"
          else
            echo "⚠️ [DB_02] 缓存失效，正在下载初始数据..."
            git clone --depth 1 https://x-access-token:${{ secrets.MY_PAT }}@github.com/rendie-com/rendie-sqlite3-shopee-product temp_db_02
            mkdir -p ${{ env.DB_02 }}
            cp -af temp_db_02/${{ env.DB_02 }}/. ${{ env.DB_02 }}/
            rm -rf temp_db_02
          fi

      - name: 6. 环境准备 (Node.js 24)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: |
            node.js/package-lock.json
            next.js/package-lock.json

      - name: 7. 构建并运行生产环境
        env:
          NEXT_PUBLIC_DEFAULT_DB: "pg02" 
          NEXTJS_CONFIG_SQLITE: "../sqlite3/{database}.db"
          NEXTJS_CONFIG_PG02: ${{ secrets.NEXTJS_CONFIG_PG02 }}
        run: |
          # 并行安装系统库与依赖
          sudo apt-get update -o Acquire::Languages=none -qq && sudo apt-get install -y --no-install-recommends fonts-droid-fallback libgbm-dev -qq &
          npm ci --prefix node.js --prefer-offline --no-audit &
          npm ci --prefix next.js --prefer-offline --no-audit &
          wait
          
          # 构建与启动
          npm run build --prefix next.js
          npm run start --prefix next.js & 
          
          sleep 10
          cd node.js && npm run start

      - name: 8. 删除【shopee/营销中心/】【shopee/商品/】缓存
        run: |
          gh cache list --limit 100 | grep -E "shopee-product-|shopee-marketing-" | cut -f 1 | xargs -I {} gh cache delete {}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}