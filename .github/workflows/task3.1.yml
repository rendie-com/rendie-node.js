name: 3.1 SHOPEE-营销中心-商品-1天

on:
  workflow_dispatch: 
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write
  actions: write

env:   
  TZ: Asia/Shanghai
  NODE_ACCESS_TOKEN: ${{ secrets.NODE_ACCESS_TOKEN_3 }}
  GITHUB_TOKEN: ${{ secrets.MY_PAT }}
  DB_PATH: "./sqlite3/shopee"

jobs:
  automation_job:
    runs-on: ubuntu-latest
    timeout-minutes: 80 
    steps:
      - name: 1. 拉取代码 (主程序 & 前端)
        run: |
          git clone --depth 1 https://github.com/${{ github.repository }} .
          git clone --depth 1 https://x-access-token:${{ secrets.MY_PAT }}@github.com/rendie-com/rendie-next.js next.js

      - name: 2. 数据库高速缓存还原
        uses: actions/cache@v4
        with:
          path: ${{ env.DB_PATH }}
          key: shopee-db-${{ github.run_id }}
          restore-keys: shopee-db-

      - name: 3. (备选) 下载初始数据库
        # 如果缓存还原后目录下没有 .db 文件，则从远程仓库拉取备份
        if: hashFiles('sqlite3/**/*.db') == ''
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.MY_PAT }}@github.com/rendie-com/rendie-sqlite3-shopee-marketing db_m
          git clone --depth 1 https://x-access-token:${{ secrets.MY_PAT }}@github.com/rendie-com/rendie-sqlite3-shopee-product db_p
          mkdir -p ${{ env.DB_PATH }}/营销中心 ${{ env.DB_PATH }}/商品
          cp -af db_m/sqlite3/shopee/营销中心/. ${{ env.DB_PATH }}/营销中心/
          cp -af db_p/sqlite3/shopee/商品/. ${{ env.DB_PATH }}/商品/

      - name: 4. 环境准备
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: "**/package-lock.json"

      - name: 5. 构建并运行生产环境
        env:
          NODE_USERNAME: "1day"
          MAX_RUNTIME_MINUTES: 70
          TARGET_DIR: "error/task3"
          GITHUB_OWNER: "rendie-com"
          GITHUB_REPO: "rendie-node.js-error"
          NEXT_PUBLIC_DEFAULT_DB: "pg02" 
          NEXTJS_CONFIG_SQLITE: "../sqlite3/{database}.db"
          NEXTJS_CONFIG_PG02: ${{ secrets.NEXTJS_CONFIG_PG02 }}
        run: |
          # 1. 并行安装系统库与依赖
          sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends ttf-wqy-zenhei libgbm-dev -qq &
          npm ci --prefix node.js --prefer-offline --no-audit &
          npm ci --prefix next.js --prefer-offline --no-audit &
          wait
          
          # 2. 编译并启动服务
          echo "正在构建并启动服务..."
          npm run build --prefix next.js
          npm run start --prefix next.js & 
          
          # 等待前端就绪
          sleep 10
          
          # 启动主程序
          cd node.js && npm run start