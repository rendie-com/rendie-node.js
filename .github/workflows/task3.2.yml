name: 3.2 SHOPEE-商品-营销中心-3天(备份)

on:
  workflow_dispatch: 
  schedule:
    - cron: "0 0 */3 * *"

permissions:
  contents: write
  actions: write

env:   
  TZ: Asia/Shanghai
  DB_01: "./sqlite3/shopee/营销中心"
  DB_02: "./sqlite3/shopee/商品"

jobs:
  automation_job:
    runs-on: ubuntu-latest
    timeout-minutes: 10 
    steps:
      - name: 1. 下载主程序代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 2. 【shopee/营销中心/】数据库还原 (只读模式)
        uses: actions/cache/restore@v4  # 注意这里改成了 cache/restore
        with:
          path: ${{ env.DB_01 }}
          key: shopee-marketing-not-exists-${{ github.run_id }} # 故意给一个不存在的key
          restore-keys: |
            shopee-marketing-

      - name: 3. 【shopee/商品/】数据库还原 (只读模式)
        uses: actions/cache/restore@v4  # 注意这里改成了 cache/restore
        with:
          path: ${{ env.DB_02 }}
          key: shopee-product-not-exists-${{ github.run_id }}
          restore-keys: |
            shopee-product-

      - name: 4. 推送数据库（备份至远程仓库）
        run: |
          # 定义需要同步的映射 "本地目录|远程仓库名"
          SYNC_LIST=(
            "${{ env.DB_01 }}|rendie-sqlite3-shopee-marketing"
            "${{ env.DB_02 }}|rendie-sqlite3-shopee-product"
          )

          for item in "${SYNC_LIST[@]}"; do
            LOCAL_PATH="${item%%|*}"
            REPO_NAME="${item##*|}"
            
            echo "--- 开始备份: $LOCAL_PATH -> $REPO_NAME ---"
            
            if [ ! -d "$LOCAL_PATH" ] || [ -z "$(ls -A $LOCAL_PATH 2>/dev/null)" ]; then
              echo "⚠️ 路径 $LOCAL_PATH 为空，跳过。"
              continue
            fi

            # 修正点：克隆到以仓库名命名的目录，避免第二次循环冲突
            git clone --depth 1 https://x-access-token:${{ secrets.MY_PAT }}@github.com/rendie-com/${REPO_NAME}.git "tmp_$REPO_NAME"
            
            mkdir -p "tmp_$REPO_NAME/$LOCAL_PATH"
            cp -af "$LOCAL_PATH/." "tmp_$REPO_NAME/$LOCAL_PATH/"
            
            cd "tmp_$REPO_NAME"
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            
            if [ -n "$(git status --porcelain)" ]; then
              git add .
              git commit -m "backup-sync: $(date '+%Y%m%d-%H%M')"
              git push origin main
              echo "✅ 推送成功。"
            else
              echo "ℹ️ 数据无变化，跳过推送。"
            fi
            
            cd ..
          done

      - name: 5. 任务清理：保留最新50条并删除余下旧记录
        if: always()
        run: |
          gh run list --status completed --limit 500 --json databaseId --jq '.[].databaseId' \
            | tail -n +51 \
            | xargs -I {} gh run delete {}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}