name: 1.2 Shopee用户相关-4小时 (备份)

on:
  workflow_dispatch: 
  schedule:
    - cron: "0 0 * * *"
permissions:
  contents: write
  actions: write
env:   
  DB_01: "./sqlite3/shopee/采集箱"
  DB_02: "./sqlite3/shopee/聊聊"
jobs:
  automation_job:
    runs-on: ubuntu-latest
    timeout-minutes: 80 
    steps:
      - name: 1. 下载主程序代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 3. 数据库高速缓存还原 (DB_01)
        uses: actions/cache@v4
        with:
          path: ${{ env.DB_01 }}
          key: shopee-crawler-${{ github.run_id }}
          restore-keys: |
            shopee-crawler-

      - name: 4. 数据库高速缓存还原 (DB_02)
        uses: actions/cache@v4
        with:
          path: ${{ env.DB_02 }}
          key: shopee-chat-${{ github.run_id }}
          restore-keys: |
            shopee-chat-

      - name: 4. 推送数据库（备份至远程仓库）
        run: |
          # 定义需要同步的映射 "本地目录|远程仓库名"
          SYNC_LIST=(
            "${{ env.DB_01 }}|rendie-sqlite3-shopee-crawler"
            "${{ env.DB_02 }}|rendie-sqlite3-shopee-chat"
          )

          for item in "${SYNC_LIST[@]}"; do
            LOCAL_PATH="${item%%|*}"
            REPO_NAME="${item##*|}"
            
            echo "--- 开始备份: $LOCAL_PATH -> $REPO_NAME ---"
            
            if [ ! -d "$LOCAL_PATH" ] || [ -z "$(ls -A $LOCAL_PATH 2>/dev/null)" ]; then
              echo "⚠️ 路径 $LOCAL_PATH 为空，跳过。"
              continue
            fi

            # 修正点：克隆到以仓库名命名的目录，避免第二次循环冲突
            git clone --depth 1 https://x-access-token:${{ secrets.MY_PAT }}@github.com/rendie-com/${REPO_NAME}.git "tmp_$REPO_NAME"
            
            mkdir -p "tmp_$REPO_NAME/$LOCAL_PATH"
            cp -af "$LOCAL_PATH/." "tmp_$REPO_NAME/$LOCAL_PATH/"
            
            cd "tmp_$REPO_NAME"
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            
            if [ -n "$(git status --porcelain)" ]; then
              git add .
              git commit -m "backup-sync: $(date '+%Y%m%d-%H%M')"
              git push origin main
              echo "✅ 推送成功。"
            else
              echo "ℹ️ 数据无变化，跳过推送。"
            fi
            
            cd ..
          done