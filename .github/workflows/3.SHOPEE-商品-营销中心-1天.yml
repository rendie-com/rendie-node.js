name: 3.SHOPEE-商品-营销中心-1天

on:
  workflow_dispatch:
    inputs:
      force_backup:
        description: '是否强制触发备份推送？(true/false)'
        required: false
        default: 'false'
  schedule:
    - cron: "0 0 * * *" # 每天凌晨 00:00 准时自动启动

permissions:
  contents: write
  actions: write

env:   
  TZ: Asia/Shanghai
  NODE_USERNAME: "1day"
  NODE_ACCESS_TOKEN: ${{ secrets.NODE_ACCESS_TOKEN_3 }}
  MAX_RUNTIME_MINUTES: 1
  TARGET_DIR: "error/task3"
  GITHUB_TOKEN: ${{ secrets.MY_PAT }}
  TARGET_URL: "http://localhost:3000/admin"
  TEMPLATE: "Shopee/任务/index.js&jsFile=js02"
  DB_01: "sqlite3/shopee/营销中心"
  DB_02: "sqlite3/shopee/商品"

jobs:
  automation_and_backup:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
    timeout-minutes: 60 
    steps:
      - name: 1. 下载主程序代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 2. 下载核心前端代码
        uses: actions/checkout@v6
        with:
          repository: rendie-com/rendie-next.js
          token: ${{ secrets.MY_PAT }}
          path: next.js
          fetch-depth: 1

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: |
            ~/.npm
            next.js/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('next.js/**/*.{js,jsx,ts,tsx}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: 3. 【shopee/营销中心/】数据库历史还原 (只读模糊匹配上次缓存)
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.DB_01 }}
          key: shopee-marketing-
          restore-keys: |
            shopee-marketing-

      - name: 4. 【shopee/商品/】数据库历史还原 (只读模糊匹配上次缓存)
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.DB_02 }}
          key: shopee-product-
          restore-keys: |
            shopee-product-

      - name: 5. 数据库状态检查与同步 (调用外部脚本)
        env:
          MY_PAT: ${{ secrets.MY_PAT }}
        run: bash workflows/3/db_sync.sh

      - name: 6. 环境准备 (Node.js 24)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: |
            playwright/package-lock.json
            next.js/package-lock.json

      - name: 7. 构建并运行生产环境 (调用外部脚本)
        env:
          NEXT_PUBLIC_DEFAULT_DB: "pg02" 
          NEXTJS_CONFIG_SQLITE: "../sqlite3/{database}.db"
          NEXTJS_CONFIG_PG02: ${{ secrets.NEXTJS_CONFIG_PG02 }}
        run: bash workflows/3/run_prod.sh

      - name: 8. 增量推送至远程备份仓库 (调用外部脚本)
        if: always() 
        env:
          MY_PAT: ${{ secrets.MY_PAT }}
          FORCE_BACKUP: ${{ github.event.inputs.force_backup }}
        run: bash workflows/3/sync_backup.sh

      - name: 9.1 更新【营销中心】本地缓存基准
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ${{ env.DB_01 }}
          key: shopee-marketing-${{ github.run_id }}-${{ github.run_attempt }}

      - name: 9.2 更新【商品】本地缓存基准
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ${{ env.DB_02 }}
          key: shopee-product-${{ github.run_id }}-${{ github.run_attempt }}

      - name: 10. 自动清理历史运行记录与过期缓存 (调用外部脚本)
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.MY_PAT }}
        run: bash workflows/3/cleanup.sh