name: 1.1 Shopee用户相关-4小时

on:
  workflow_dispatch: 
  schedule:
    - cron: "0 */4 * * *"

permissions:
  contents: write
  actions: write

env:   
  TZ: Asia/Shanghai
  NODE_USERNAME: "4hour"
  NODE_ACCESS_TOKEN: ${{ secrets.NODE_ACCESS_TOKEN_1 }}
  MAX_RUNTIME_MINUTES: 70
  TARGET_DIR: "error/task1"
  GITHUB_TOKEN: ${{ secrets.MY_PAT }}
  TARGET_URL: "http://localhost:3000/admin"
  TEMPLATE: "Shopee/任务/index.js&jsFile=js02"
  DB_01: "./sqlite3/shopee/采集箱"
  DB_02: "./sqlite3/shopee/聊聊"

jobs:
  automation_job:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
    timeout-minutes: 80 
    steps:
      - name: 1. 代码检出
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 2. 检出核心前端
        uses: actions/checkout@v4
        with:
          repository: rendie-com/rendie-next.js
          token: ${{ secrets.MY_PAT }}
          path: next.js
          fetch-depth: 1

      # 严格保留你的缓存名
      - name: 3. 数据库高速缓存还原 (DB_01)
        id: cache-db-01
        uses: actions/cache@v4
        with:
          path: ${{ env.DB_01 }}
          key: shopee-crawler-${{ github.run_id }}
          restore-keys: |
            shopee-crawler-

      - name: 4. 数据库高速缓存还原 (DB_02)
        id: cache-db-02
        uses: actions/cache@v4
        with:
          path: ${{ env.DB_02 }}
          key: shopee-chat-${{ github.run_id }}
          restore-keys: |
            shopee-chat-

      - name: 5. 数据库同步状态检查
        run: |
          # 仅在缓存未命中时执行降级同步
          if [ "${{ steps.cache-db-01.outputs.cache-hit }}" != 'true' ]; then
            echo "⚠️ [DB_01] 缓存失效，下载中..."
            git clone --depth 1 https://x-access-token:${{ secrets.MY_PAT }}@github.com/rendie-com/rendie-sqlite3-shopee-crawler.git .temp_db01
            mkdir -p "${{ env.DB_01 }}"
            cp -af .temp_db01/${{ env.DB_01 }}/. ${{ env.DB_01 }}/
            rm -rf .temp_db01
          else
            echo "✅ [DB_01] 缓存命中"
          fi

          if [ "${{ steps.cache-db-02.outputs.cache-hit }}" != 'true' ]; then
            echo "⚠️ [DB_02] 缓存失效，下载中..."
            git clone --depth 1 https://x-access-token:${{ secrets.MY_PAT }}@github.com/rendie-com/rendie-sqlite3-shopee-chat.git .temp_db02
            mkdir -p "${{ env.DB_02 }}"
            cp -af .temp_db02/${{ env.DB_02 }}/. ${{ env.DB_02 }}/
            rm -rf .temp_db02
          else
            echo "✅ [DB_02] 缓存命中"
          fi

      - name: 6. 环境准备
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: "**/package-lock.json"

      - name: 7. 构建并运行生产环境
        run: |
          npm ci --prefix playwright --prefer-offline --no-audit --quiet &
          npm ci --prefix next.js --prefer-offline --no-audit --quiet &
          wait
          npm run build --prefix next.js
          npm run start --prefix next.js & 
          cd playwright && npm run start
        env:
          NEXT_PUBLIC_DEFAULT_DB: "pg02" 
          NEXTJS_CONFIG_SQLITE: "../sqlite3/{database}.db"
          NEXTJS_CONFIG_PG02: ${{ secrets.NEXTJS_CONFIG_PG02 }}